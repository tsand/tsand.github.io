<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="author" content="#" />
        <meta name="description" content="#" />
        <meta name="referrer" content="no-referrer" />
        <link rel="icon" href="/static/icon/t.svg" />

        <link rel="preload" as="style" href="assets/styles.css" />
        <link rel="stylesheet" href="assets/styles.css" />

        <link rel="preload" href="assets/script.js" as="script" />

        <title>Theisen Sanders</title>

        <script>
            const theme =
                localStorage.theme ||
                (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
            document.documentElement.setAttribute("data-theme", theme);
        </script>
    </head>

    <body>
        <main role="main">
            <div class="container">
                <div class="toolbar">
                    <a href="/" role="link" aria-label="Home" class="icon-link">
                        <svg viewBox="0 0 100 100" role="img" xmlns="http://www.w3.org/2000/svg">
                            <line
                                x1="20"
                                y1="20"
                                x2="80"
                                y2="20"
                                stroke="currentColor"
                                stroke-width="16" />
                            <line
                                x1="50"
                                y1="20"
                                x2="50"
                                y2="90"
                                stroke="currentColor"
                                stroke-width="16" />
                            <line
                                x1="20"
                                y1="12"
                                x2="20"
                                y2="34"
                                stroke="currentColor"
                                stroke-width="12" />
                            <line
                                x1="80"
                                y1="12"
                                x2="80"
                                y2="34"
                                stroke="currentColor"
                                stroke-width="12" />
                            <line
                                x1="36"
                                y1="90"
                                x2="64"
                                y2="90"
                                stroke="currentColor"
                                stroke-width="12" />
                        </svg>
                    </a>
                    <div id="modes"></div>
                    <a
                        href="https://github.com/tsand"
                        role="link"
                        aria-label="Github"
                        class="icon-link">
                        <svg viewBox="0 0 98 96" role="img" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z" />
                        </svg>
                    </a>
                </div>
                <div class="chat-area"></div>
                <div class="chat-input">
                    <div class="input-group">
                        <textarea
                            class="chat-input"
                            placeholder="Type your question here..."
                            autofocus></textarea>
                        <button id="submit" class="button-svg">
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 0 512 512"
                                class="hide-disabled">
                                <path
                                    d="M504 256C504 119 393 8 256 8S8 119 8 256s111 248 248 248 248-111 248-248zm-448 0c0-110.5 89.5-200 200-200s200 89.5 200 200-89.5 200-200 200S56 366.5 56 256zm72 20v-40c0-6.6 5.4-12 12-12h116v-67c0-10.7 12.9-16 20.5-8.5l99 99c4.7 4.7 4.7 12.3 0 17l-99 99c-7.6 7.6-20.5 2.2-20.5-8.5v-67H140c-6.6 0-12-5.4-12-12z" />
                            </svg>
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 0 512 512"
                                class="spin show-disabled">
                                <path
                                    d="M456.433 371.72l-27.79-16.045c-7.192-4.152-10.052-13.136-6.487-20.636 25.82-54.328 23.566-118.602-6.768-171.03-30.265-52.529-84.802-86.621-144.76-91.424C262.35 71.922 256 64.953 256 56.649V24.56c0-9.31 7.916-16.609 17.204-15.96 81.795 5.717 156.412 51.902 197.611 123.408 41.301 71.385 43.99 159.096 8.042 232.792-4.082 8.369-14.361 11.575-22.424 6.92z" />
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="prompts"></div>
                <div class="footer">
                    <p>&copy;<span id="current-year">2023</span> Theisen Sanders</p>
                    <div id="theme">
                        <input type="checkbox" id="theme-toggle" name="theme-toggle" />
                        <label for="theme-toggle">Dark Mode</label>
                    </div>
                    <div>
                        <a href="#" id="reset">Reset</a>
                    </div>
                    <div>
                        <a
                            href="#"
                            role="link"
                            aria-label="#"
                            class="canned-prompt"
                            data-submit="false"
                            data-prompt="Send an email to Theisen with the subject 'Hello' and the body:"
                            >Contact</a
                        >
                    </div>
                </div>
            </div>
        </main>

        <script src="assets/script.js"></script>
    </body>
</html>
